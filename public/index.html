<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prod.AI - Mentor Virtual</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
  <script src="auth.js" defer></script>
</head>
<body>
  <div class="particles"></div>

  <!-- Cabeçalho animado -->
  <div class="prodai-header" id="prodaiHeader">
    <div class="logo">Prod.AI</div>
    <p class="subtitle">Seu mentor virtual inteligente</p>
  </div>

  <div class="container fade-in chat-container" id="chatContainer">
    <div class="chatbox" id="chatbox"></div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-container chat-input-expanded" id="expandedInput">
      <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button onclick="sendMessage()" id="sendBtn" class="btn-plus">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 21L23 12L2 3V10L17 12L2 14V21Z" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <footer class="footer">
      <div class="footer-buttons">
        <a href="planos.html" class="btn-plus">Assinar versão Plus</a>
        <button class="btn-plus" onclick="logout()">Sair</button>
      </div>
      <p>Siga no Instagram: <a href="https://instagram.com/djcorreaoriginal" target="_blank">@djcorreaoriginal</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
