<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prod.AI - Mentor Virtual</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.3.1/firebase-firestore-compat.js"></script>
  <!-- FingerprintJS caso use no chat também -->
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
  <!-- Seu auth.js -->
  <script src="auth.js" defer></script>
</head>
<body>
  <div class="particles"></div>

  <div class="container fade-in">
    <header class="header" id="header">
      <h1 class="logo">Prod.AI</h1>
      <p class="subtitle">Seu mentor virtual inteligente</p>
    </header>

    <!-- Texto motivacional -->
    <div class="motivational-text" id="motivationalText">
      "Qual sua dúvida na produção musical hoje? Estou aqui para resolver qualquer problema!"
    </div>

    <!-- Input inicial centralizado -->
    <div class="initial-input-container" id="initialInputContainer">
      <input type="text" id="initialInput" class="initial-input" placeholder="Digite aqui..." autocomplete="off" />
      <button class="initial-send-btn" id="initialSendBtn">
        ✈️
      </button>
    </div>

    <!-- Chat container (inicialmente oculto) -->
    <div class="chat-container" id="chatContainer">
      <div class="chatbox" id="chatbox">
        <div class="message bot">
          <div class="message-content">
            <strong>Assistente:</strong> Olá! Sou seu mentor virtual. Como posso te ajudar hoje?
          </div>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span class="typing-text">Assistente está digitando...</span>
      </div>

      <div class="input-container">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off" />
        <button onclick="sendMessage()" id="sendBtn" class="btn-plus">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m22 2-7 20-4-9-9-4Z"/>
            <path d="M22 2 11 13"/>
          </svg>
          Enviar
        </button>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-buttons">
        <a href="planos.html" class="btn-plus">Assinar versão Plus</a>
        <button class="btn-plus" onclick="logout()">Sair</button>
      </div>
      <p>Siga no Instagram: <a href="https://instagram.com/djcorreaoriginal" target="_blank">@djcorreaoriginal</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
